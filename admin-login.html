<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>King Barber — Yönetici Girişi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin-style.css" />
</head>
<body class="login-page">

  <div class="login-bg">
    <div class="login-bg-pattern"></div>
    <div class="login-bg-glow"></div>
  </div>

  <div class="login-container">

    <div class="login-brand">
      <div class="login-logo">
        <span class="logo-king">KING</span>
        <span class="logo-barber">BARBER</span>
      </div>
      <p class="login-tagline">Yönetici Paneli</p>
    </div>

    <div class="login-card">
      <div class="login-card-header">
        <div class="login-icon">
          <svg viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="14" r="7" stroke="currentColor" stroke-width="2"/>
            <path d="M6 36c0-7.7 6.3-14 14-14s14 6.3 14 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h1>Hoş Geldiniz</h1>
        <p>Devam etmek için giriş yapın</p>
      </div>

      <form class="login-form" id="loginForm" novalidate>
        <div class="login-field">
          <label for="email">Kullanıcı Adı</label>
          <div class="field-wrap">
            <svg class="field-icon" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M3 17c0-3.9 3.1-7 7-7s7 3.1 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input type="text" id="email" placeholder="admin" autocomplete="username" required />
          </div>
        </div>

        <div class="login-field">
          <label for="password">Şifre</label>
          <div class="field-wrap">
            <svg class="field-icon" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="9" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M6.5 9V6.5a3.5 3.5 0 017 0V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="10" cy="14" r="1.5" fill="currentColor"/>
            </svg>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Şifreyi göster/gizle">
              <svg class="eye-show" viewBox="0 0 20 20" fill="none">
                <path d="M1 10s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              <svg class="eye-hide" viewBox="0 0 20 20" fill="none" style="display:none">
                <path d="M3 3l14 14M8.5 8.5A2.5 2.5 0 0013 10M6.5 6.5C4.5 7.7 2.5 9.5 1 10s3.5 6 9 6c1.7 0 3.2-.4 4.5-1M12 4.5C13.8 5.3 16.2 7.5 19 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="loginError" class="login-error" style="display:none"></div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span class="login-btn-text">Giriş Yap</span>
          <span class="login-btn-spinner" style="display:none">
            <svg viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="rgba(0,0,0,0.3)" stroke-width="3"/>
              <path d="M12 2a10 10 0 0110 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </span>
        </button>
      </form>

      <div class="login-footer">
        <a href="index.html" class="back-link">
          <svg viewBox="0 0 16 16" fill="none">
            <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Siteye Dön
        </a>
      </div>
    </div>

    <p class="login-copyright">© 2026 King Barber. Yönetici Paneli.</p>
  </div>

  <script type="module" src="admin-login.js"></script>
</body>
</html>
